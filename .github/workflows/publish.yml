name: release

on:
  workflow_dispatch:

permissions:
  id-token: write # For OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node "24.x"
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate openapi types
        run: pnpm gen:type

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --provenance --tag "$(jq '.version | match("alpha|beta").string // "latest"' < package.json)"
